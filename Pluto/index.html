<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robot Controller</title>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --accent-mid: rgba(0,229,160,0.35);
    --danger: #ff4d4d;
    --danger-dim: rgba(255,77,77,0.12);
    --text: #f0f0f2;
    --muted: #72727a;
    --btn-active: rgba(0,229,160,0.18);
    --radius: 12px;
    --font: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 32px; height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 1.8; }

  h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }

  .status-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot.error { background: var(--danger); }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 320px;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* D-Pad */
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    grid-template-rows: repeat(3, 72px);
    gap: 5px;
  }

  .dpad-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, border-color 0.1s, transform 0.08s;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .dpad-btn:hover { background: var(--accent-dim); border-color: var(--accent-mid); }
  .dpad-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    transform: scale(0.94);
  }
  .dpad-btn svg { width: 22px; height: 22px; stroke: var(--text); fill: none; stroke-width: 2; pointer-events: none; }
  .dpad-btn.active svg { stroke: var(--accent); }
  .dpad-btn.center-cell { grid-column: 2; grid-row: 2; background: var(--bg); border-color: transparent; cursor: default; }

  /* Stop button */
  .stop-btn {
    background: var(--danger-dim);
    border: 1px solid rgba(255,77,77,0.3);
    border-radius: 10px;
    color: var(--danger);
    font-family: var(--font);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 32px;
    cursor: pointer;
    width: 100%;
    transition: background 0.1s, border-color 0.1s, transform 0.08s;
  }
  .stop-btn:hover { background: rgba(255,77,77,0.22); border-color: var(--danger); }
  .stop-btn:active, .stop-btn.active { transform: scale(0.97); background: rgba(255,77,77,0.3); }

  /* Log */
  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 320px;
    overflow: hidden;
  }
  .log-header {
    padding: 10px 14px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .log-body {
    padding: 10px 14px;
    height: 100px;
    overflow-y: auto;
    display: flex;
    flex-direction: column-reverse;
    gap: 3px;
  }
  .log-entry {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 8px;
  }
  .log-entry .cmd { color: var(--accent); font-weight: 600; min-width: 28px; }
  .log-entry .ts { color: var(--surface2); }

  /* Keyboard hint */
  .hint {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-align: center;
  }
  .kbd {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
  }

  .ws-url {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
  }
  .ws-url span { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
  </div>
  <h1>Robot Control</h1>
</header>

<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="status-text">Connecting…</span>
</div>

<div class="panel">
  <div class="label">Direction</div>

  <div class="dpad">
    <!-- Row 1 -->
    <div></div>
    <div class="dpad-btn" id="btn-W" data-cmd="W" title="Forward">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div></div>
    <!-- Row 2 -->
    <div class="dpad-btn" id="btn-A" data-cmd="A" title="Left">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="dpad-btn center-cell"></div>
    <div class="dpad-btn" id="btn-D" data-cmd="D" title="Right">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </div>
    <!-- Row 3 -->
    <div></div>
    <div class="dpad-btn" id="btn-S" data-cmd="S" title="Backward">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div></div>
  </div>

  <button class="stop-btn" id="btn-P">⏹ Stop</button>

  <div class="hint">
    <span class="kbd">W</span>
    <span class="kbd">A</span>
    <span class="kbd">S</span>
    <span class="kbd">D</span>
    keyboard supported &nbsp;·&nbsp;
    <span class="kbd">Space</span> to stop
  </div>
</div>

<div class="log-panel">
  <div class="log-header">
    <span>Command log</span>
    <span id="cmd-count" style="color: var(--accent)">0 sent</span>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<div class="ws-url">WebSocket: <span id="ws-addr">—</span></div>

<script>
  const WS_PORT = 8765;
  const wsUrl = `ws://${location.hostname}:${WS_PORT}`;
  document.getElementById('ws-addr').textContent = wsUrl;

  let ws = null;
  let cmdCount = 0;
  let reconnectTimer = null;

  const dot = document.getElementById('dot');
  const statusText = document.getElementById('status-text');

  function setStatus(state, text) {
    dot.className = 'dot ' + state;
    statusText.textContent = text;
  }

  function connect() {
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      setStatus('connected', 'Connected');
      clearTimeout(reconnectTimer);
    };

    ws.onclose = () => {
      setStatus('error', 'Disconnected — retrying…');
      reconnectTimer = setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      setStatus('error', 'Connection error');
    };

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.ack) appendLog(data.ack);
      } catch {}
    };
  }

  function send(cmd) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ command: cmd }));
      cmdCount++;
      document.getElementById('cmd-count').textContent = cmdCount + ' sent';
    }
  }

  function appendLog(cmd) {
    const now = new Date();
    const ts = now.toTimeString().slice(0, 8);
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="cmd">${cmd}</span><span class="ts">${ts}</span>`;
    const body = document.getElementById('log-body');
    body.prepend(entry);
    while (body.children.length > 40) body.removeChild(body.lastChild);
  }

  // ── D-pad button logic ─────────────────────────────────────────────────────
  let activeKeys = new Set();
  let repeatInterval = null;

  function computeCommand() {
    const up = activeKeys.has('W');
    const down = activeKeys.has('S');
    const left = activeKeys.has('A');
    const right = activeKeys.has('D');
    let cmd = '';
    if (up) cmd += 'W';
    else if (down) cmd += 'S';
    if (left) cmd += 'A';
    else if (right) cmd += 'D';
    return cmd;
  }

  function startSending(key) {
    if (activeKeys.has(key)) return;
    activeKeys.add(key);
    updateButtonVisuals();
    stopSendingLoop();
    repeatInterval = setInterval(() => {
      const cmd = computeCommand();
      if (cmd) send(cmd);
    }, 120);
  }

  function stopSending(key) {
    activeKeys.delete(key);
    updateButtonVisuals();
    if (activeKeys.size === 0) {
      stopSendingLoop();
    }
  }

  function stopSendingLoop() {
    if (repeatInterval) { clearInterval(repeatInterval); repeatInterval = null; }
  }

  function updateButtonVisuals() {
    ['W','A','S','D'].forEach(k => {
      const el = document.getElementById('btn-' + k);
      if (el) el.classList.toggle('active', activeKeys.has(k));
    });
  }

  // D-pad pointer events
  document.querySelectorAll('.dpad-btn[data-cmd]').forEach(btn => {
    const cmd = btn.dataset.cmd;
    btn.addEventListener('pointerdown', e => { e.preventDefault(); btn.setPointerCapture(e.pointerId); startSending(cmd); });
    btn.addEventListener('pointerup', () => stopSending(cmd));
    btn.addEventListener('pointercancel', () => stopSending(cmd));
  });

  // Stop button
  const stopBtn = document.getElementById('btn-P');
  stopBtn.addEventListener('pointerdown', e => { e.preventDefault(); send('P'); stopBtn.classList.add('active'); });
  stopBtn.addEventListener('pointerup', () => stopBtn.classList.remove('active'));

  // Keyboard
  const keyMap = { w: 'W', a: 'A', s: 'S', d: 'D', arrowup: 'W', arrowleft: 'A', arrowdown: 'S', arrowright: 'D' };

  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    const k = e.key.toLowerCase();
    if (k === ' ') { e.preventDefault(); send('P'); stopBtn.classList.add('active'); return; }
    const mapped = keyMap[k];
    if (mapped) { e.preventDefault(); startSending(mapped); }
  });

  document.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (k === ' ') { stopBtn.classList.remove('active'); return; }
    const mapped = keyMap[k];
    if (mapped) stopSending(mapped);
  });

  connect();
</script>
</body>
</html>
