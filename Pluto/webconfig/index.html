<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robot Controller</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    </div>
    <h1>Robot Control</h1>
  </div>
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<div class="main">
  <div class="left-col">
    <div class="video-panel">
      <img id="cam-img" alt="Camera feed" />
      <div class="video-placeholder" id="cam-placeholder">
        <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.277A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.9L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
        <span id="cam-status">Connecting to camera…</span>
      </div>
      <div class="cam-badge">CAM 01 · 640×480</div>
      <div class="live-badge" id="live-badge"><div class="rec-dot"></div>LIVE</div>
    </div>
    <div class="cam-actions">
      <button class="cam-btn" data-cmd="L">
        <svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2a7 7 0 017 7c0 2.5-1.3 4.7-3.3 6L15 17H9l-.7-2C6.3 13.7 5 11.5 5 9a7 7 0 017-7z"/></svg>
        Lights
      </button>
      <button class="cam-btn" data-cmd="H">
        <svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/></svg>
        Horn
      </button>
    </div>
  </div>

  <div class="right-col">
    <div class="dpad-wrap">
      <div class="label">Direction</div>
      <div class="dpad-row">
        <div class="dpad-inner">
          <div class="dpad">
            <div></div>
            <div class="dpad-btn" id="btn-W" data-cmd="W">
              <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
            </div>
            <div></div>
            <div class="dpad-btn" id="btn-A" data-cmd="A">
              <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </div>
            <div class="dpad-btn center-cell"></div>
            <div class="dpad-btn" id="btn-D" data-cmd="D">
              <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
            </div>
            <div></div>
            <div class="dpad-btn" id="btn-S" data-cmd="S">
              <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div></div>
          </div>
          <button class="stop-btn" id="btn-P">⏹ Stop</button>
          <div class="hint">
            <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span> to move<br>
            <span class="kbd">Space</span> to stop
          </div>
        </div>
        <div class="tilt-wrap">
          <span class="label">Speed</span>
          <span class="tilt-val" id="tilt-val">50</span>
          <input type="range" class="tilt-slider" id="slider-tilt" min="0" max="255" value="150" />
        </div>
      </div>
    </div>
  </div>
</div>

<div class="log-panel">
  <div class="log-header">
    <span>Command log</span>
    <span id="cmd-count" style="color: var(--accent)">0 sent</span>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<div class="lidar-panel">
  <div class="log-header">
    <span>LiDAR · Point Cloud</span>
    <span id="lidar-info" style="color: var(--accent)">—</span>
  </div>
  <canvas id="lidar-canvas"></canvas>
</div>

<script>
  const WS_PORT = 8765;
  const CAM_PORT = 8090;
  const wsUrl = `ws://${location.hostname}:${WS_PORT}`;
  const camUrl = `http://${location.hostname}:${CAM_PORT}/stream`;

  // ── Camera ────────────────────────────────────────────────────────────────
  const camImg = document.getElementById('cam-img');
  const camPlaceholder = document.getElementById('cam-placeholder');
  const camStatus = document.getElementById('cam-status');
  const liveBadge = document.getElementById('live-badge');

  function startCamera() {
    camImg.src = camUrl;
    camImg.onload = () => {
      camImg.style.display = 'block';
      camPlaceholder.style.display = 'none';
      liveBadge.classList.add('visible');
    };
    camImg.onerror = () => {
      camImg.style.display = 'none';
      camPlaceholder.style.display = 'flex';
      liveBadge.classList.remove('visible');
      camStatus.textContent = 'Camera unavailable — retrying…';
      setTimeout(startCamera, 3000);
    };
  }
  startCamera();

  // ── WebSocket ─────────────────────────────────────────────────────────────
  let ws = null, cmdCount = 0, reconnectTimer = null;
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('status-text');

  function setStatus(state, text) { dot.className = 'dot ' + state; statusText.textContent = text; }

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => { setStatus('connected', 'Connected'); clearTimeout(reconnectTimer); };
    ws.onclose = () => { setStatus('error', 'Disconnected — retrying…'); reconnectTimer = setTimeout(connect, 2000); };
    ws.onerror = () => setStatus('error', 'Connection error');
    ws.onmessage = (e) => { try { const d = JSON.parse(e.data); if (d.ack) appendLog(d.ack); } catch {} };
  }

  function send(cmd) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ command: cmd }));
      cmdCount++;
      document.getElementById('cmd-count').textContent = cmdCount + ' sent';
    }
  }

  function appendLog(cmd) {
    const ts = new Date().toTimeString().slice(0, 8);
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="cmd">${cmd}</span><span class="ts">${ts}</span>`;
    const body = document.getElementById('log-body');
    body.prepend(entry);
    while (body.children.length > 40) body.removeChild(body.lastChild);
  }

  // ── D-pad ─────────────────────────────────────────────────────────────────
  let activeKeys = new Set(), repeatInterval = null;

  function computeCommand() {
    let cmd = '';
    if (activeKeys.has('W')) cmd += 'W'; else if (activeKeys.has('S')) cmd += 'S';
    if (activeKeys.has('A')) cmd += 'A'; else if (activeKeys.has('D')) cmd += 'D';
    return cmd;
  }

  function startSending(key) {
    if (activeKeys.has(key)) return;
    activeKeys.add(key);
    updateVisuals();
    if (!repeatInterval) repeatInterval = setInterval(() => { const c = computeCommand(); if (c) send(c); }, 120);
  }

  function stopSending(key) {
    activeKeys.delete(key);
    updateVisuals();
    if (activeKeys.size === 0) { clearInterval(repeatInterval); repeatInterval = null; }
  }

  function updateVisuals() {
    ['W','A','S','D'].forEach(k => { const el = document.getElementById('btn-'+k); if (el) el.classList.toggle('active', activeKeys.has(k)); });
  }

  document.querySelectorAll('.dpad-btn[data-cmd]').forEach(btn => {
    const cmd = btn.dataset.cmd;
    btn.addEventListener('pointerdown', e => { e.preventDefault(); btn.setPointerCapture(e.pointerId); startSending(cmd); });
    btn.addEventListener('pointerup', () => stopSending(cmd));
    btn.addEventListener('pointercancel', () => stopSending(cmd));
  });

  const stopBtn = document.getElementById('btn-P');
  stopBtn.addEventListener('pointerdown', e => { e.preventDefault(); send('P'); stopBtn.classList.add('active'); });
  stopBtn.addEventListener('pointerup', () => stopBtn.classList.remove('active'));

  const keyMap = { w:'W', a:'A', s:'S', d:'D', arrowup:'W', arrowleft:'A', arrowdown:'S', arrowright:'D' };
  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    const k = e.key.toLowerCase();
    if (k === ' ') { e.preventDefault(); send('P'); stopBtn.classList.add('active'); return; }
    const m = keyMap[k]; if (m) { e.preventDefault(); startSending(m); }
  });
  document.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (k === ' ') { stopBtn.classList.remove('active'); return; }
    const m = keyMap[k]; if (m) stopSending(m);
  });

  // ── Camera action buttons ─────────────────────────────────────────────────
  const lightsBtn = document.querySelector('.cam-btn[data-cmd="L"]');
  let lightsOn = localStorage.getItem('lights') === 'on';
  if (lightsOn) lightsBtn.classList.add('active');

  lightsBtn.addEventListener('click', () => {
    lightsOn = !lightsOn;
    lightsBtn.classList.toggle('active', lightsOn);
    localStorage.setItem('lights', lightsOn ? 'on' : 'off');
    send('L');
  });

  document.querySelectorAll('.cam-btn:not([data-cmd="L"])').forEach(btn => {
    btn.addEventListener('click', () => send(btn.dataset.cmd));
  });

  // ── Tilt slider ───────────────────────────────────────────────────────────
  const tiltSlider = document.getElementById('slider-tilt');
  const tiltVal = document.getElementById('tilt-val');

  // Restore saved value without sending it on load
  const savedTilt = localStorage.getItem('tilt');
  if (savedTilt !== null) {
    tiltSlider.value = savedTilt;
    tiltVal.textContent = savedTilt;
  }

  tiltSlider.addEventListener('input', () => {
    tiltVal.textContent = tiltSlider.value;
    localStorage.setItem('tilt', tiltSlider.value);
    send('T' + tiltSlider.value);
  });

  // ── LiDAR canvas ──────────────────────────────────────────────────────────
  const lidarCanvas = document.getElementById('lidar-canvas');
  const lidarInfo = document.getElementById('lidar-info');

  function resizeLidarCanvas() {
    const size = lidarCanvas.clientWidth;
    if (lidarCanvas.width !== size) {
      lidarCanvas.width = size;
      lidarCanvas.height = size;
    }
  }

  function drawLidar(points) {
    resizeLidarCanvas();
    const ctx = lidarCanvas.getContext('2d');
    const W = lidarCanvas.width, H = lidarCanvas.height;
    const cx = W / 2, cy = H / 2;
    const maxDist = 6000; // mm — 6 m scale
    const scale = (W / 2 - 10) / maxDist;

    ctx.clearRect(0, 0, W, H);

    // Grid rings
    ctx.strokeStyle = '#1a1a2a';
    ctx.lineWidth = 1;
    [1500, 3000, 4500, 6000].forEach(r => {
      ctx.beginPath();
      ctx.arc(cx, cy, r * scale, 0, Math.PI * 2);
      ctx.stroke();
    });
    // Cross hairs
    ctx.beginPath();
    ctx.moveTo(cx, 0); ctx.lineTo(cx, H);
    ctx.moveTo(0, cy); ctx.lineTo(W, cy);
    ctx.stroke();

    if (!points || points.length === 0) return;

    // Find closest
    let minDist = Infinity, minPt = null;
    for (const [angle, dist] of points) {
      if (dist < minDist) { minDist = dist; minPt = [angle, dist]; }
    }

    // Draw points
    ctx.fillStyle = '#00e55c';
    for (const [angle, dist] of points) {
      const rad = (angle - 90) * Math.PI / 180;
      const r = Math.min(dist, maxDist) * scale;
      const x = cx + r * Math.cos(rad);
      const y = cy + r * Math.sin(rad);
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Closest point in red
    if (minPt) {
      const rad = (minPt[0] - 90) * Math.PI / 180;
      const r = Math.min(minPt[1], maxDist) * scale;
      ctx.fillStyle = '#ff4d4d';
      ctx.beginPath();
      ctx.arc(cx + r * Math.cos(rad), cy + r * Math.sin(rad), 4, 0, Math.PI * 2);
      ctx.fill();
      lidarInfo.textContent = `${points.length} pts · closest ${(minPt[1] / 1000).toFixed(2)} m @ ${minPt[0].toFixed(1)}°`;
    }
  }

  function connectLidar() {
    const lidarWs = new WebSocket(`ws://${location.hostname}:8766`);
    lidarWs.onmessage = (e) => {
      try { drawLidar(JSON.parse(e.data)); } catch {}
    };
    lidarWs.onclose = () => setTimeout(connectLidar, 3000);
    lidarWs.onerror = () => { lidarInfo.textContent = 'LiDAR offline'; };
  }
  connectLidar();

  connect();
</script>
</body>
</html>
